{% extends 'base.html' %} {% block content %}
<div class="container mt-4">
  <h2>Admin: Manage Resources</h2>
  </div>
  <form method="POST" class="mb-5">
    <div class="form-group">
      <label>Job Role</label>
      <select name="job_role" class="form-control" required>
        {% for role in job_roles %}
        <option value="{{ role.id }}">{{ role.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group mt-2">
      <label>Concept</label>
      <input name="title" class="form-control" required />
    </div>
    <div class="form-group mt-2">
      <label>Description</label>
      <textarea name="description" class="form-control"></textarea>
    </div>
    <div class="form-group mt-2">
      <label>URL</label>
      <input name="url" type="url" class="form-control" required />
    </div>
    <button class="btn btn-primary mt-3">Add Resource</button>
  </form>

  <hr />
  <h4>All Resources</h4>
  {% for res in resources %}
  <div class="border p-3 mt-3">
    <h5>{{ res['title'] }}</h5>
    <p>{{ res['description'] }}</p>
    <a href="{{ res['url'] }}" target="_blank">{{ res['url'] }}</a><br />
    <small>Role: {{ res['job_role_name'] }} | {{ res['created_at'] }}</small
    ><br />
    <a
      href="{{ url_for('edit_resource', id=res['id']) }}"
      class="btn btn-sm btn-warning mt-2"
      >Edit</a
    >
    <form
      method="POST"
      action="{{ url_for('delete_resource', id=res['id']) }}"
      style="display: inline"
    >
      <button class="btn btn-sm btn-danger mt-2">Delete</button>
    </form>
  </div>
  {% endfor %}
</div>
{% endblock %}
