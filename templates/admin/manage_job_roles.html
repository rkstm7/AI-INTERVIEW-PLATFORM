{% extends 'base.html' %} {% block content %}
<div class="container mt-5">
  <h2 class="mb-4">Manage Job Roles</h2>

  <!-- Add Job Role Form -->
  <form method="POST" class="mb-4">
    <div class="input-group">
      <input
        type="text"
        class="form-control"
        name="role_name"
        placeholder="Enter new job role"
        required
      />
      <button type="submit" name="add_role" class="btn btn-success">
        Add Role
      </button>
    </div>
  </form>

  <!-- List Existing Job Roles -->
  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Role Name</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for role in job_roles %}
      <tr>
        <td>{{ role[0] }}</td>
        <td>{{ role[1] }}</td>
        <td>
          <!-- Edit Role Form -->
          <form method="POST" class="d-inline">
            <input type="hidden" name="role_id" value="{{ role[0] }}" />
            <input
              type="text"
              name="updated_name"
              value="{{ role[1] }}"
              required
              class="form-control d-inline w-auto"
            />
            <button
              type="submit"
              name="edit_role"
              class="btn btn-primary btn-sm ms-2"
            >
              Edit
            </button>
          </form>

          <!-- Delete Role Form -->
          <form method="POST" class="d-inline ms-2">
            <input type="hidden" name="role_id" value="{{ role[0] }}" />
            <button
              type="submit"
              name="delete_role"
              class="btn btn-danger btn-sm"
              onclick="return confirm('Are you sure you want to delete this role?');"
            >
              Delete
            </button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr>
        <td colspan="3" class="text-center">No job roles found.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
